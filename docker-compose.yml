version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: stbank-leadgen-db
    environment:
      POSTGRES_USER: stbank
      POSTGRES_PASSWORD: stbank_password
      POSTGRES_DB: stbank_leadgen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stbank"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stbank-leadgen-api
    environment:
      DATABASE_URL: postgresql://stbank:stbank_password@db:5432/stbank_leadgen
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stbank-leadgen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Frontend Web
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stbank-leadgen-web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: stbank-network